name: Draft Release

# Fires when a vX.Y.Z tag is pushed to the repository.
# Creates a draft GitHub Release using the matching
# .github/release-notes/vX.Y.Z.md file as the body, and attaches the
# plugin source and all lang files as release assets.
#
# A version-sanity check aborts the run if the pushed tag does not match
# the version field in manifest.json, preventing tag/manifest drift from
# producing a corrupt release.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  draft-release:
    name: Create draft release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Derive version strings ──────────────────────────────────────
      - name: Derive version from tag
        id: version
        run: |
          # Strip the leading 'v' from the tag name (refs/tags/v3.4.1 → 3.4.1)
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ── 3. Sanity check: tag must match manifest.json ──────────────────
      - name: Verify tag matches manifest.json version
        run: |
          TAG_VER="${{ steps.version.outputs.version }}"
          MANIFEST_VER="$(jq -r '.version' manifest.json)"

          echo "Tag version    : ${TAG_VER}"
          echo "Manifest version: ${MANIFEST_VER}"

          if [ "${TAG_VER}" != "${MANIFEST_VER}" ]; then
            echo "::error::Tag version (${TAG_VER}) does not match manifest.json version (${MANIFEST_VER}). Aborting."
            exit 1
          fi

      # ── 4. Verify the plugin [Info] version matches too ───────────────
      - name: Verify tag matches plugin [Info] version
        run: |
          TAG_VER="${{ steps.version.outputs.version }}"
          # Extract the version (third quoted argument) from the plugin's
          # [Info("Bottomless Water", "<author>", "<version>")] attribute.
          PLUGIN_VER="$(grep -oP 'Info\("Bottomless Water"[^)]*"\K[0-9]+\.[0-9]+\.[0-9]+' oxide/plugins/BottomlessWater.cs)"

          echo "Plugin [Info] version: ${PLUGIN_VER}"

          if [ "${TAG_VER}" != "${PLUGIN_VER}" ]; then
            echo "::error::Tag version (${TAG_VER}) does not match plugin [Info] version (${PLUGIN_VER}). Aborting."
            exit 1
          fi

      # ── 5. Resolve release notes file ─────────────────────────────────
      - name: Resolve release notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES_FILE=".github/release-notes/${TAG}.md"

          if [ -f "${NOTES_FILE}" ]; then
            echo "Using release notes: ${NOTES_FILE}"
            echo "path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
            echo "found=true"         >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No release notes file found at ${NOTES_FILE}. Falling back to CHANGELOG.md excerpt."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 6. Extract CHANGELOG fallback if no notes file ────────────────
      - name: Extract CHANGELOG section (fallback)
        id: changelog
        if: steps.notes.outputs.found == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          FALLBACK=".github/release-notes/${TAG}-generated.md"

          # Extract the block between this version's heading and the next
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > "${FALLBACK}"

          if [ ! -s "${FALLBACK}" ]; then
            echo "_No release notes or CHANGELOG entry found for ${TAG}._" > "${FALLBACK}"
          fi

          echo "path=${FALLBACK}" >> "$GITHUB_OUTPUT"

      # ── 7. Collect assets ─────────────────────────────────────────────
      - name: Collect release assets
        id: assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="release-assets"
          mkdir -p "${STAGING}"

          # Plugin source (primary deliverable)
          cp oxide/plugins/BottomlessWater.cs "${STAGING}/BottomlessWater.cs"

          # Detached signature + public key (DunganSoft Plugin Standard §11), when present.
          [ -f "oxide/plugins/BottomlessWater.cs.asc" ] && cp "oxide/plugins/BottomlessWater.cs.asc" "${STAGING}/BottomlessWater.cs.asc" || true
          [ -f "keys/gjdunga.asc" ] && cp "keys/gjdunga.asc" "${STAGING}/gjdunga.asc" || true

          # Lang files — include all locales; flatten to BottomlessWater-<locale>.json
          for dir in oxide/lang/*/; do
            locale="$(basename "${dir}")"
            src="${dir}BottomlessWater.json"
            if [ -f "${src}" ]; then
              cp "${src}" "${STAGING}/BottomlessWater-${locale}.json"
            fi
          done

          echo "Staged assets:"
          ls -lh "${STAGING}/"

          echo "dir=${STAGING}" >> "$GITHUB_OUTPUT"

      # ── 8. Create the draft release ───────────────────────────────────
      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       "BottomlessWater ${{ steps.version.outputs.tag }}"
          body_path:  ${{ steps.notes.outputs.found == 'true' && steps.notes.outputs.path || steps.changelog.outputs.path }}
          draft:      true
          prerelease: false
          files: |
            ${{ steps.assets.outputs.dir }}/BottomlessWater.cs
            ${{ steps.assets.outputs.dir }}/BottomlessWater.cs.asc
            ${{ steps.assets.outputs.dir }}/gjdunga.asc
            ${{ steps.assets.outputs.dir }}/BottomlessWater-*.json
